<?xml version="1.0" standalone="no"?>
<svg version="1.0" xmlns="http://www.w3.org/2000/svg"
 width="1024" height="1024" viewBox="0 0 1024 1024"
 preserveAspectRatio="xMidYMid meet">

  <!-- Background circle -->
  <circle cx="512" cy="512" r="500" fill="#E0F9F3"/>

  <!-- Outer ring accent -->
  <circle cx="512" cy="512" r="500" fill="none" stroke="#B5CABF" stroke-width="6"/>

  <!-- Inner shield/heart-ish rounded square base for the cross -->
  <defs>
    <clipPath id="cardClip">
      <rect x="262" y="262" width="500" height="500" rx="140"/>
    </clipPath>
  </defs>
  <rect x="262" y="262" width="500" height="500" rx="140"
        fill="#089675"/>

  <!-- Soft sage highlight along the top edge for subtle depth -->
  <g clip-path="url(#cardClip)">
    <ellipse cx="512" cy="230" rx="320" ry="180" fill="#B5CABF" opacity="0.22"/>
  </g>

  <!-- Plus / medical cross -->
  <g fill="#E0F9F3">
    <path d="M468 340
             h88
             a24 24 0 0 1 24 24
             v140
             h140
             a24 24 0 0 1 24 24
             v88
             a24 24 0 0 1 -24 24
             h-140
             v140
             a24 24 0 0 1 -24 24
             h-88
             a24 24 0 0 1 -24 -24
             v-140
             h-140
             a24 24 0 0 1 -24 -24
             v-88
             a24 24 0 0 1 24 -24
             h140
             v-140
             a24 24 0 0 1 24 -24 z"/>
  </g>

</svg>
